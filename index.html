    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <!---GSAP JS -->
    <script src="https://unpkg.com/gsap/dist/gsap.min.js"></script>
    <script src="https://unpkg.com/gsap/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/MotionPathPlugin.min.js"></script>

    <!-- lenis -->
    <script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

    <script>
        gsap.registerPlugin(ScrollTrigger, MotionPathPlugin);

        try {
            const lenis = new Lenis({
                duration: 1.8,
                easing: (t) => 1 - Math.pow(1 - t, 4),
                smoothWheel: true,
            });

            lenis.on('scroll', ScrollTrigger.update);

            gsap.ticker.add((time) => lenis.raf(time * 1000));
            gsap.ticker.lagSmoothing(0);

            // expose for debugging
            window.lenis = lenis;
        } catch (e) {
            // Lenis not available — fail silently
        }

        AOS.init({
            once: false,
            mirror: true,
            duration: 300,
        });

        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = fullyear;


        const heroSection = document.querySelector('section');
        const bike = document.getElementById('bike');

        function calcX() {
            return -window.innerWidth;
        }

        if (bike && heroSection) {

            const bikeAnim = gsap.to(bike, {
                scale: 1,
                x: calcX(),
                y: -0,
                ease: "none",
                scrollTrigger: {
                    trigger: heroSection,
                    start: "top top",
                    end: "bottom top",
                    scrub: 1,
                    markers: true
                }
            });

            window.addEventListener('resize', () => {
                bikeAnim.vars.x = calcX();
                bikeAnim.invalidate();
                ScrollTrigger.refresh();
            });
        }


        gsap.utils.toArray("#cloud").forEach((cloud, i) => {
            gsap.to(cloud, {
                x: i % 2 === 0 ? 100 : -100,
                ease: "none",
                scrollTrigger: {
                    trigger: "section",
                    start: "top top",
                    end: "bottom top",
                    scrub: 1
                }
            });
        });


    </script>
</body>
